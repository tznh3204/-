<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="🤍 رسالة خاصة لك">

<meta property="og:description" content="رسالة حب وغرام خاصة بك 💕">

<meta property="og:image" content="https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?w=500">

<title>🤍 رسالة خاصة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Cairo', sans-serif;

    min-height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    background-color:#170322;

    background-image:
    radial-gradient(circle at 15% 10%, rgba(255,255,255,0.18), transparent 24%),
    radial-gradient(circle at 80% 10%, rgba(255,255,255,0.12), transparent 18%),
    linear-gradient(180deg, rgba(255,123,156,0.95), rgba(105,34,199,0.82) 45%, rgba(44,11,74,0.95)),
    url('https://cdn.discordapp.com/attachments/1431423889212444854/1499921841832067112/IMG_2264.jpg?ex=69ff2052&is=69fdced2&hm=b0cef006980e22dd7df1804d3a7f8fc2d3493c7643ea63f5f15cdf2321af6316&');

    background-size:cover;

    background-position:center;

    position:relative;
}

/* التوهج */

.glow{

    position:absolute;

    width:600px;
    height:600px;

    background:radial-gradient(circle, rgba(255,255,255,0.22), rgba(255,63,146,0.08) 40%, transparent 70%);

    border-radius:50%;

    filter:blur(90px);

    animation:pulse 5s infinite alternate;
}

@keyframes pulse{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.2);
    }
}

/* القلوب */

.heart{

    position:absolute;

    color:#ffe9ff;

    opacity:0.85;

    pointer-events:none;

    animation:float 8s linear infinite;

    text-shadow:
    0 0 10px rgba(255,125,200,0.8),
    0 0 18px rgba(255,255,255,0.6);
}

@keyframes float{

    0%{

        transform:
        translateY(100vh)
        scale(0.5)
        rotate(0deg);

        opacity:0;
    }

    30%{
        opacity:1;
    }

    100%{

        transform:
        translateY(-20vh)
        scale(1.3)
        rotate(360deg);

        opacity:0;
    }
}

/* الكارد */

.card{

    width:400px;

    background:rgba(255,255,255,0.15);

    border:1px solid rgba(255,255,255,0.2);

    backdrop-filter:blur(20px);

    border-radius:35px;

    padding:50px 40px;

    text-align:center;

    position:relative;

    z-index:10;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);

    animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* القلب */

.bigHeart{

    font-size:80px;

    margin-bottom:20px;

    animation:beat 1.5s infinite;

    text-shadow:
    0 0 25px rgba(255,255,255,0.65),
    0 0 12px rgba(255,20,147,0.9);
}

@keyframes beat{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.15);
    }

    100%{
        transform:scale(1);
    }
}

/* العنوان */

h1{

    color:white;

    margin-bottom:15px;

    font-size:32px;

    font-weight:700;
}

/* الوصف */

.subtitle{

    color:rgba(255,255,255,0.9);

    font-size:18px;

    margin-bottom:30px;

    line-height:1.8;
}

/* الأزرار */

.buttons-container{

    display:flex;

    gap:15px;

    justify-content:center;

    margin-top:35px;

    flex-wrap:wrap;
}

button{

    padding:13px 30px;

    border:none;

    border-radius:50px;

    font-size:15px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 5px 20px rgba(255,255,255,0.25);
}

.btn-primary{

    background:white;

    color:#ff1e4d;
}

.btn-primary:hover{

    transform:
    scale(1.08)
    translateY(-2px);

    box-shadow:
    0 10px 30px rgba(255,255,255,0.4);
}

.btn-secondary{

    background:rgba(255,255,255,0.2);

    color:white;

    border:1px solid rgba(255,255,255,0.3);
}

.btn-secondary:hover{

    background:rgba(255,255,255,0.3);

    transform:
    scale(1.08)
    translateY(-2px);
}

/* الزخارف */

.circle{

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,0.08);
}

.c1{

    width:120px;
    height:120px;

    top:-40px;
    left:-40px;
}

.c2{

    width:90px;
    height:90px;

    bottom:-30px;
    right:-20px;
}

/* رمز النسخ */

.copy-icon {
    cursor:pointer;
    display:inline-block;
    margin-right:5px;
}

.copy-icon:hover {
    transform:scale(1.2);
}

.share-link {
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    padding:10px 15px;
    border-radius:20px;
    margin-top:15px;
    color:rgba(255,255,255,0.8);
    font-size:12px;
    word-break:break-all;
}

/* الاستجابة للهواتف الذكية */

@media (max-width: 768px){

    body{
        overflow:auto;
        min-height:100vh;
    }

    .glow{
        width:400px;
        height:400px;
    }

    .card{
        width:90%;
        max-width:350px;
        padding:30px 20px;
        margin:20px;
    }

    h1{
        font-size:28px;
        margin-bottom:15px;
    }

    .subtitle{
        font-size:16px;
    }

    .bigHeart{
        font-size:65px;
        margin-bottom:12px;
    }

    .buttons-container{
        flex-direction:column;
        gap:10px;
    }

    button{
        width:100%;
        padding:15px 20px;
        font-size:16px;
    }

    .share-link {
        font-size:11px;
        padding:8px 12px;
    }
}

@media (max-width: 480px){

    .card{
        width:95%;
        max-width:320px;
        padding:25px 15px;
    }

    h1{
        font-size:24px;
    }

    .subtitle{
        font-size:14px;
    }

    .bigHeart{
        font-size:55px;
    }

    button{
        padding:12px 20px;
        font-size:14px;
    }

    .glow{
        width:300px;
        height:300px;
    }

    .c1{
        width:70px;
        height:70px;
        top:-15px;
        left:-15px;
    }

    .c2{
        width:50px;
        height:50px;
        bottom:-15px;
        right:-12px;
    }

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="card">

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="bigHeart">🤍</div>

    <h1>رسالة خاصة لك</h1>

    <div class="subtitle">
        رسالة حب وغرام مليئة بالمشاعر الدافئة 💕
    </div>

    <div class="buttons-container">
        <button class="btn-primary" onclick="goToMessage()">
            اقرأ الرسالة 💌
        </button>
        <button class="btn-secondary" onclick="copyLink()">
            <span class="copy-icon">📋</span> نسخ الرابط
        </button>
    </div>

    <div class="share-link" id="shareLink">
        https://tznh3204.github.io/-/
    </div>

</div>

<script>

/* إنشاء القلوب */

function createHeart(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    Math.random()*20 + 10 + "px";

    heart.style.animationDuration =
    Math.random()*4 + 4 + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,150);

/* الانتقال للرسالة */

function goToMessage(){
    window.location.href = './مفاجاة.html';
}

/* نسخ الرابط */

function copyLink(){
    const link = document.getElementById('shareLink').innerText;
    navigator.clipboard.writeText(link).then(()=>{
        alert('✅ تم نسخ الرابط بنجاح!');
    }).catch(()=>{
        alert('❌ فشل النسخ');
    });
}

</script>

</body>

</html>
